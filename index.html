<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edna y Roberto</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="assets/css/styles.css">

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

</head>

<body>
    
<main id="main">
    <div class="contenedor_fondo">

        <!-- Panel 1 -->
        <div class="fondo fondo--primero">
            <div class="bg imagen1"></div>
            <div class="nuestra fade">Nuestra Boda</div>
        </div>

        <!-- Panel 2 -->
        <div class="fondo fondo--principal">
            <div class="bg imagen2"></div>
            <div class="texto_encima">
                <h1 id="Nombres" class="fade">EDNA <br> ROBERTO</h1>
                <div class="and">
                    <img class="ipsilon fade" src="assets/img/&.avif" alt="">
                </div>
            </div>
            <div class="fecha fade">05 DICIEMBRE 2026</div>
            <div id="countdown">
                <div><span id="dias">00</span><p>Días</p></div>
                <div><span id="horas">00</span><p>Horas</p></div>
                <div><span id="minutos">00</span><p>Min</p></div>
                <div><span id="segundos">00</span><p>Seg</p></div>
            </div>
        </div>

        <!-- Panel 3 -->
        <div class="fondo fondo--tercero">
            <div class="bg imagen3"></div>
        </div>

    </div>
</main>

    <section id="save">

        <div class="cancion">
            <p class="titulo">
                Sparks - Coldplay
            </p>
            <div class="barra">
                <img src="assets/img/music-notes-svgrepo-com (2).svg" alt="Notes Svg" class="notas">
                <button id="btn-audio" aria-label="Reproducir música">
                    <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    <svg id="icon-pause" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24" style="display:none">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                </button>

                <audio id="audio" src="assets/media/Coldplay - Sparks.mp3" loop></audio>

                <div class="progress-container" id="progressContainer">
                    <div class="progress" id="progress"></div>
                </div>
            </div>
        </div>

    </section>

    <script src="main.js"></script>
</body>
</html>
